name: Release

on:
  release:
    types: [published]

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: "1.25"

      - name: Build darwin/arm64 binary
        run: |
          GOOS=darwin GOARCH=arm64 go build \
            -ldflags "-s -w -X main.version=${{ github.ref_name }}" \
            -o apricot \
            ./cmd/apricot/
          tar czf apricot_darwin_arm64.tar.gz apricot
          sha256sum apricot_darwin_arm64.tar.gz > apricot_darwin_arm64.tar.gz.sha256

      - name: Upload release assets
        uses: softprops/action-gh-release@v2
        with:
          files: |
            apricot_darwin_arm64.tar.gz
            apricot_darwin_arm64.tar.gz.sha256
